# webwaka-logistics — Cloudflare Workers configuration
# Shared 2-DB model: webwaka-production-db + webwaka-staging-db
# Table prefix: logi_

name = "webwaka-logistics"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "ef463888d10e487ba4fe3563f7f71964"

[[kv_namespaces]]
binding = "EVENTS"
id = "ed98b167646d4469a4f03a2c9ab95781"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-logistics-storage-dev"

# ── Staging Environment ─────────────────────────────────────────────────────
[env.staging]
name = "webwaka-logistics-api-staging"
vars = { ENVIRONMENT = "staging", LOGISTICS_PORTAL_URL = "https://logistics-staging.webwaka.ng" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-staging-db"
database_id = "d7278ca0-2408-40d5-a08b-d8456601f667"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "ef463888d10e487ba4fe3563f7f71964"

[[env.staging.kv_namespaces]]
binding = "EVENTS"
id = "ed98b167646d4469a4f03a2c9ab95781"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-logistics-storage-staging"

# ── Production Environment ──────────────────────────────────────────────────
[env.production]
name = "webwaka-logistics-api-prod"
vars = { ENVIRONMENT = "production", LOGISTICS_PORTAL_URL = "https://logistics.webwaka.ng" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-production-db"
database_id = "d01940d3-d69e-4455-94ba-bc2404cb3872"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "ef463888d10e487ba4fe3563f7f71964"

[[env.production.kv_namespaces]]
binding = "EVENTS"
id = "ed98b167646d4469a4f03a2c9ab95781"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-logistics-storage"
