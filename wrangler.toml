name = "webwaka-logistics"
main = "server/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "webwaka-logistics-db"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "EVENTS"
id = "00000000000000000000000000000000"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-logistics-storage"
