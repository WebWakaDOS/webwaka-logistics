name: Deploy Logistics to Staging

on:
  push:
    branches: [ develop ]

jobs:
  # ============================================================================
  # TEST
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test

  # ============================================================================
  # WORKER DEPLOY (Staging)
  # ============================================================================
  deploy-workers:
    name: Deploy Workers to Staging
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Apply D1 Migrations (Staging)
        run: |
          echo "Applying D1 migrations to staging..."
          for migration in migrations/*.sql; do
            echo "Applying: $migration"
            npx wrangler d1 execute webwaka-logistics-db --env staging --file "$migration" --remote || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Workers to Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
      - name: Verify API health (Staging)
        run: |
          sleep 15
          curl -sf https://webwaka-logistics-api-staging.webwaka.workers.dev/health || echo "Health check pending..."

  # ============================================================================
  # PWA DEPLOY (Staging)
  # ============================================================================
  deploy-pages-staging:
    name: Deploy PWA to Cloudflare Pages (Staging)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build PWA (Vite)
        run: npm run build
        env:
          VITE_API_BASE: https://webwaka-logistics-api-staging.webwaka.workers.dev
          VITE_TENANT_ID: tnt_demo
      - name: Deploy PWA to Cloudflare Pages (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name webwaka-logistics-ui --branch develop
