name: Deploy to Production

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test

  migrate-production:
    name: Apply D1 Migrations (Production)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Apply D1 Migrations (Production)
        run: npx wrangler d1 migrations apply webwaka-production-db --env production --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-workers:
    name: Deploy Workers to Production
    runs-on: ubuntu-latest
    needs: [migrate-production]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Deploy Workers to Production
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify API health
        run: |
          sleep 20
          curl -sf https://webwaka-logistics-api-prod.webwaka.workers.dev/health || echo "Health check pending..."

  deploy-pages:
    name: Deploy PWA to Cloudflare Pages (Production)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build PWA (Vite)
        run: npm run build
        env:
          VITE_API_BASE: https://webwaka-logistics-api-prod.webwaka.workers.dev
          VITE_TENANT_ID: tnt_demo
      - name: Deploy PWA to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name webwaka-logistics-ui --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-workers, deploy-pages]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: logistics-v${{ github.run_number }}
          name: "WebWaka Logistics v${{ github.run_number }}"
          body: |
            ## WebWaka Logistics — Production Release
            - **API**: https://webwaka-logistics-api-prod.webwaka.workers.dev
            - **PWA**: https://webwaka-logistics-ui.pages.dev
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
